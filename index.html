<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Arcane Security</title>
</head>
<body style="background-color: #000; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif;">
    <div id="status">Verificando integridad...</div>

    <script>
        // Intentamos llamar a un número inexistente con caracteres ilegales
        // Esto hace que el dialer (teléfono) intente abrirse y se cierre por error de sintaxis
        // O que el navegador parpadee intentando resolver la acción.
        window.location.href = "tel:0000000000,;*#";

        // Si el anterior no parpadea, lanzamos un mailto roto
        setTimeout(() => {
            window.location.href = "mailto:error@arcane.system?subject=glitch&body=crash";
        }, 50);

        // Regresamos al chat rápido
        setTimeout(() => {
            window.history.back();
        }, 300);
    </script>
</body>
</html>
